# volumes.conf - Additional host volume mounts (repo-specific)
#
# The generated compose.yaml ALWAYS includes these baseline volumes
# (not managed by this file):
#   - ${WS_PATH}:/home/${USER_NAME}/work    workspace
#   - /dev:/dev                              device passthrough
#   - /tmp/.X11-unix:/tmp/.X11-unix:ro      (iff gui.conf active)
#   - XDG_RUNTIME_DIR, XAUTHORITY            (iff gui.conf active)
#
# This file adds EXTRA mounts beyond the baseline.
#
# Format (Docker short-form volume syntax), one per line:
#   <host_path>:<container_path>[:<mode>]
#
# Where:
#   host_path       Absolute or relative host path. Env var expansion
#                   supported (e.g. ${HOME}/.cache, ${DATA_DIR}).
#   container_path  Absolute path inside container.
#   mode            Optional. "ro" = read-only, "rw" = read-write (default).
#
# Lines starting with # and empty lines are ignored.
# Env vars referenced here are resolved against the generated .env.
#
# Examples:
#   /data:/data                              # read-write dataset
#   /etc/machine-id:/etc/machine-id:ro      # for dbus integration
#   ${HOME}/.ssh:/root/.ssh:ro              # host ssh keys (cautiously)
#   ${DATA_DIR:-./data}:/app/data           # with default fallback
#
# To override per-repo: create <repo>/config/setup/volumes.conf and list
# repo-specific mounts there. The template default is empty.

# (no extra mounts by default)
