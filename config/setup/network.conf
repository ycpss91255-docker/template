# network.conf - Container network, IPC, privileged configuration
#
# These values are baked into the generated compose.yaml as literal
# strings (not env var references) so the compose.yaml reflects the
# repo's actual effective settings when inspected.
#
# Parameters:
#
#   mode        Container network mode:
#                 host     Share host network stack (most dev envs, ROS)
#                 bridge   Isolated bridge (Docker default)
#                 none     No networking
#               Custom named networks are not supported here; edit
#               compose.yaml post-generation if needed.
#
#   ipc         Container IPC namespace:
#                 host        Share host IPC (shared memory with host apps)
#                 shareable   Own IPC, accessible to other containers
#                 private     Own IPC, isolated (Docker default)
#
#   privileged  Run container with full host privileges:
#                 true    Required for /dev access, kernel features, GPU
#                 false   Unprivileged (safer, but many dev uses need true)
#
# To override per-repo: create <repo>/config/setup/network.conf and edit.
#   ./template/init.sh --gen-conf network

mode=host
ipc=host
privileged=true
