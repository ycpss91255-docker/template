# setup.conf - runtime configuration consumed by setup.sh.
#
# setup.sh reads this file + system detection → generates .env + compose.yaml.
# Template default lives at <template>/setup.conf; per-repo override at
# <repo>/setup.conf. Section-level replace strategy: a section present in the
# per-repo file fully replaces the template's section. Sections the per-repo
# file omits fall back to the template default.
#
# Lines starting with # and empty lines are ignored. key = value format;
# whitespace around keys and values is trimmed.

# ═════════════════════════════════════════════════════════════════════
# [image_name] — IMAGE_NAME detection rules
# ═════════════════════════════════════════════════════════════════════
#
# rules   Ordered, comma-separated list of detection rules. Rules apply
#         in order; first match wins. Accepted rule types:
#
#           prefix:<value>   Match dirname starting with <value>, strip it.
#                            e.g. "prefix:docker_" → "docker_ros_noetic" → "ros_noetic"
#
#           suffix:<value>   Scan path components for any ending with <value>,
#                            strip it.
#                            e.g. "suffix:_ws" → "/home/ros_noetic_ws/src" → "ros_noetic"
#
#           @env_example     Read IMAGE_NAME from .env.example in repo root.
#                            e.g. ".env.example" with IMAGE_NAME=my_app → "my_app"
#
#           @basename        Use the dirname as-is (last-resort fallback;
#                            not enabled by default).
#
#           @default:<value> Use <value> as final fallback when no other
#                            rule matches. Prints an INFO log so users know
#                            to set IMAGE_NAME explicitly.
[image_name]
rules = @env_example, prefix:docker_, suffix:_ws, @default:unknown

# ═════════════════════════════════════════════════════════════════════
# [gpu] — GPU reservation
# ═════════════════════════════════════════════════════════════════════
#
# Controls whether the generated compose.yaml includes the
# deploy.resources.reservations.devices block for NVIDIA GPU.
#
# mode          Behaviour for GPU block inclusion:
#                 auto    Detect nvidia-container-toolkit via dpkg-query.
#                         Enable GPU block if toolkit installed, else omit.
#                 force   Always include GPU block (fail-fast on non-GPU hosts).
#                 off     Never include GPU block.
#
# count         Number of GPUs to reserve. Applied only when block enabled.
#                 all         Reserve all available GPUs (default).
#                 <integer>   Reserve exactly N GPUs (e.g. 1, 2).
#
# capabilities  Space-separated GPU capabilities to request:
#                 gpu         Basic (default, most cases).
#                 compute     CUDA compute.
#                 utility     nvidia-smi etc.
#                 graphics    OpenGL/Vulkan rendering.
#               Combine by space: "compute utility graphics"
[gpu]
mode = auto
count = all
capabilities = gpu

# ═════════════════════════════════════════════════════════════════════
# [gui] — GUI display support
# ═════════════════════════════════════════════════════════════════════
#
# Controls whether the generated compose.yaml includes GUI-related
# environment variables (DISPLAY, WAYLAND_DISPLAY, XDG_RUNTIME_DIR,
# XAUTHORITY) and X11 volume mounts (/tmp/.X11-unix, XAUTHORITY,
# XDG_RUNTIME_DIR).
#
# mode   Behaviour for GUI block inclusion:
#          auto    Detect host GUI by checking $DISPLAY and $WAYLAND_DISPLAY.
#                  Include block if either is set, else omit.
#          force   Always include GUI block (assumes host has X11/Wayland).
#          off     Never include GUI block (headless containers, CI, servers).
[gui]
mode = auto

# ═════════════════════════════════════════════════════════════════════
# [network] — network, IPC, privileged
# ═════════════════════════════════════════════════════════════════════
#
# Values baked into compose.yaml via .env (NETWORK_MODE, IPC_MODE, PRIVILEGED).
# Use env var override at runtime to change without re-running setup.sh
# (e.g. `NETWORK_MODE=bridge ./run.sh`).
#
# mode        Container network mode:
#               host     Share host network stack (most dev envs, ROS).
#               bridge   Isolated bridge (Docker default).
#               none     No networking.
#
# ipc         Container IPC namespace:
#               host        Share host IPC (shared memory with host apps).
#               shareable   Own IPC, accessible to other containers.
#               private     Own IPC, isolated (Docker default).
#
# privileged  Run container with full host privileges:
#               true    Required for /dev access, kernel features, GPU.
#               false   Unprivileged (safer, but many dev uses need true).
[network]
mode = host
ipc = host
privileged = true

# ═════════════════════════════════════════════════════════════════════
# [volumes] — extra host volume mounts (devices included)
# ═════════════════════════════════════════════════════════════════════
#
# Baseline volumes (not managed here, always emitted by setup.sh):
#   - ${WS_PATH}:/home/${USER_NAME}/work    workspace (unconditional)
#   - /tmp/.X11-unix:/tmp/.X11-unix:ro      (iff [gui] mode enabled)
#   - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}:rw    (iff [gui] mode enabled)
#   - ${XAUTHORITY}:${XAUTHORITY}:ro        (iff [gui] mode enabled)
#
# This section adds EXTRA mounts (including device pass-through — Docker
# volumes cover the /dev/xxx:/dev/xxx pattern without a separate devices: field).
#
# Format: mount_1..mount_N with value in Docker short-form volume syntax:
#   <host_path>:<container_path>[:<mode>]
#
# Where:
#   host_path       Absolute or relative host path. Env var expansion
#                   supported (e.g. ${HOME}/.cache, ${DATA_DIR}).
#   container_path  Absolute path inside container.
#   mode            Optional. "ro" = read-only, "rw" = read-write (default).
#
# Ordering: keys are sorted by numeric suffix, so mount_1 appears before mount_2.
#
# Examples:
#   mount_1 = /dev:/dev                            # full /dev pass-through (template default)
#   mount_1 = /dev/bus/usb:/dev/bus/usb            # selective: only USB devices
#   mount_2 = /dev/dri:/dev/dri                    # GPU DRI for OpenGL
#   mount_3 = /data:/data                          # data volume
#   mount_4 = /etc/machine-id:/etc/machine-id:ro   # dbus integration
#   mount_5 = ${HOME}/.ssh:/root/.ssh:ro           # host ssh keys (use cautiously)
[volumes]
mount_1 = /dev:/dev
# mount_2 = /data:/data
# mount_3 = /etc/machine-id:/etc/machine-id:ro
